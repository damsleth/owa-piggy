name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    # Lint + format gate (v1-08). Runs once on a single Python; the rules are
    # version-independent. mypy (Phase 2) and coverage (Phase 3) extend this.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -e '.[dev]'
      - name: Ruff lint
        run: ruff check owa_piggy tests
      - name: Ruff format
        run: ruff format --check owa_piggy tests
      - name: Types
        run: mypy owa_piggy

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.8", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install
        run: pip install -e '.[test]'
      - name: Syntax check
        run: python -m compileall -q owa_piggy
      - name: Tests
        run: pytest -q
      - name: Shellcheck
        run: shellcheck scripts/*.sh
