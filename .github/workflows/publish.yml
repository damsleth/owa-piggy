name: publish

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      # Token-based publish via repo secret UV_PUBLISH_TOKEN. Mirrors the
      # local .env workflow (`uv publish` reads the same env var name) so
      # the credential lineage stays in one place. Trusted publishing was
      # tried first but the matching pending-publisher never got wired up
      # on PyPI's side, so v0.6.2's tag run failed with invalid-publisher.
      # Attestations require OIDC and are dropped along with the OIDC
      # plumbing.
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.UV_PUBLISH_TOKEN }}
