name: Release

on:
  push:
    tags:
      - 'v*'

# Mirrors the gates in ci.yml so a tag never advertises a build that would fail
# mainline CI. PyPI publishing happens here via Trusted Publishing (OIDC) - no
# long-lived token anywhere (see AGENTS.md "Cutting a release"). Artifacts carry
# build-provenance attestations verifiable with `gh attestation verify`.
#
# Actions are SHA-pinned (version in the trailing comment); Dependabot
# (.github/dependabot.yml) opens PRs to bump them. Permissions are scoped per
# job - the top-level default is read-only.

permissions:
  contents: read

jobs:
  gates:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python: ["3.8", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install
        run: pip install -e '.[test]'
      - name: Syntax check
        run: python -m compileall -q owa_piggy
      - name: Tests
        run: >
          pytest -q --cov=owa_piggy --cov-branch
          --cov-report=term-missing --cov-fail-under=67
      - name: Core modules 100% branch
        run: >
          coverage report --fail-under=100
          --include=owa_piggy/oauth.py,owa_piggy/config.py,owa_piggy/cache.py,owa_piggy/token_flow.py,owa_piggy/jwt.py
      - name: Shellcheck
        run: shellcheck scripts/*.sh

  build:
    needs: gates
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write       # OIDC, for the provenance attestation
      attestations: write   # write the attestation to the GitHub attestations API
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: astral-sh/setup-uv@f0ec1fc3b38f5e7cd731bb6ce540c5af426746bb # v6.1.0
      - name: Resolve version from tag
        id: version
        run: |
          ref="${GITHUB_REF##*/}"
          echo "version=${ref#v}" >> "$GITHUB_OUTPUT"
      - name: Build sdist + wheel
        run: uv build
      - name: Attest build provenance (sdist + wheel)
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: 'dist/*'
      - name: Upload built distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  binaries:
    # Standalone PyInstaller binary - no Python install required.
    # See packaging/owa-piggy.spec and packaging/entry.py.
    needs: gates
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: linux-x86_64 }
          - { os: macos-13,      target: macos-x86_64 }
          - { os: macos-14,      target: macos-arm64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Resolve version from tag
        id: version
        run: |
          ref="${GITHUB_REF##*/}"
          echo "version=${ref#v}" >> "$GITHUB_OUTPUT"
      - name: Install package + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install --no-deps .
      - name: Build binary
        working-directory: packaging
        run: pyinstaller --clean --noconfirm owa-piggy.spec
      - name: Archive binary
        working-directory: packaging/dist
        run: |
          archive="owa-piggy-${{ steps.version.outputs.version }}-${{ matrix.target }}.tar.gz"
          tar czf "$archive" owa-piggy
          echo "built $archive"
      - name: Attest build provenance (binary archive)
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: 'packaging/dist/*.tar.gz'
      - name: Upload binary archive
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: binary-${{ matrix.target }}
          path: packaging/dist/*.tar.gz
          if-no-files-found: error

  pypi-publish:
    # Trusted Publishing (OIDC): no stored credential. One-time PyPI setup -
    # add this repo + the `pypi` environment as a Trusted Publisher under the
    # project's Publishing settings (see AGENTS.md).
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write       # OIDC, no stored token
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1.12.4

  github-release:
    needs: [build, binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write    # create the GitHub Release and upload artifacts
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          name: owa-piggy v${{ needs.build.outputs.version }}
          generate_release_notes: true
          # artifacts/dist/* = wheel + sdist; artifacts/binary-*/* = standalone binaries
          files: |
            artifacts/dist/*
            artifacts/binary-*/*
          fail_on_unmatched_files: true
